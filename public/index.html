<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luban Robotics #FRC9597 - A Team From K CLUB</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="app"></div>
    <button class="mobile-toggle" id="mobileToggle" onclick="toggleMobileSidebar()">☰</button>

    <script>
        // Auth state
        let currentUser = localStorage.getItem('frc_user');
        let currentRole = localStorage.getItem('frc_role');
        let currentToken = localStorage.getItem('frc_token');

        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'admin123';
        const ADMIN_TOKEN = 'admin-token-2026';
        const TESTER_USER = 'tester';
        const TESTER_PASS = 'password123';

        const THEME_KEY = 'frc_theme';

        const DEFAULT_EVENTS = ['2025-einstein'];

        function getCurrentTheme() {
            return document.body.classList.contains('light-theme') ? 'light' : 'dark';
        }

        function applyTheme(mode) {
            const isLight = mode === 'light';
            document.body.classList.toggle('light-theme', isLight);
            localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');

            const label = isLight ? '☀️' : '🌙';
            document.querySelectorAll('.theme-toggle').forEach(btn => {
                btn.textContent = label;
                btn.setAttribute('aria-label', isLight ? '切换到夜间模式' : '切换到白天模式');
                btn.setAttribute('title', isLight ? '切换到夜间模式' : '切换到白天模式');
            });
        }

        function toggleTheme() {
            applyTheme(getCurrentTheme() === 'dark' ? 'light' : 'dark');
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            applyTheme(savedTheme === 'light' ? 'light' : 'dark');
        }

        initTheme();

        if (currentUser && !currentRole) {
            currentRole = 'tester';
            localStorage.setItem('frc_role', 'tester');
        }

        function isAdmin() {
            return currentRole === 'admin' && currentToken === ADMIN_TOKEN;
        }

        function isTesterUser(username = currentUser) {
            return username === TESTER_USER;
        }

        function apiFetch(url, options = {}) {
            if (!isAdmin()) {
                return fetch(url, options);
            }
            const headers = new Headers(options.headers || {});
            headers.set('Authorization', `Bearer ${ADMIN_TOKEN}`);
            return fetch(url, { ...options, headers });
        }

        function getLocalPrescoutData() {
            return JSON.parse(localStorage.getItem('prescout_data') || '[]');
        }

        function saveLocalPrescoutData(entries) {
            localStorage.setItem('prescout_data', JSON.stringify(entries));
        }

        function getLocalScoutingData() {
            return JSON.parse(localStorage.getItem('scouting_data') || '[]');
        }

        function saveLocalScoutingData(entries) {
            localStorage.setItem('scouting_data', JSON.stringify(entries));
        }

        function getEventOptions() {
            const saved = localStorage.getItem('event_options');
            if (saved) return JSON.parse(saved);
            localStorage.setItem('event_options', JSON.stringify(DEFAULT_EVENTS));
            return [...DEFAULT_EVENTS];
        }

        function addEventOption(name) {
            if (!name) return;
            const options = getEventOptions();
            if (options.includes(name)) return;
            options.push(name);
            localStorage.setItem('event_options', JSON.stringify(options));
        }

        // Homepage content management
        const DEFAULT_HOMEPAGE_CONTENT = {
            aboutUs: {
                p1: '<strong>Luban Robotics（鲁班机器人）</strong>是一支隶属于 K CLUB 的年轻而富有朝气的 FRC 竞技机器人团队。我们以中国古代伟大工匠鲁班命名，以教育为核心使命，通过机器人竞赛这个平台，致力于激发学生的兴趣、提升学生的能力。',
                p2: '我们的核心理念是：<strong class="home-inline-accent">基于兴趣，依托赛事，提升能力</strong>。自2024年成立以来，我们在学生的科学探索、工程实践和团队协作中，秉承精益求精的工匠精神，打造每一辆竞赛机器人。通过 FIRST Robotics Competition（国际机器人竞赛）的舞台，我们帮助学生在创新、协作和坚持中学会解决真实世界的问题。',
                p3: '我们相信，<strong class="home-inline-accent">教育的价值超越赛场</strong>。无论在成败得失的淬炼中，还是在技术突破的欣喜中，我们都致力于培养学生对科学和工程的热情，铸造他们的领导力、责任感和创新思维，成为未来的技术引领者。'
            },
            features: [
                {
                    icon: '🔧',
                    title: '技术创新',
                    color: '#667eea',
                    description: '融合机械设计、电子工程、编程开发等多学科知识，打造高性能竞赛机器人'
                },
                {
                    icon: '👥',
                    title: '团队协作',
                    color: '#764ba2',
                    description: '培养学生的沟通能力、领导力和团队精神，共同应对挑战，共同成长进步'
                },
                {
                    icon: '🏆',
                    title: '竞赛精神',
                    color: '#667eea',
                    description: '参加 FIRST Robotics Competition，与全球优秀团队切磋交流，追求卓越表现'
                },
                {
                    icon: '📚',
                    title: '教育赋能',
                    color: '#764ba2',
                    description: '基于兴趣、依托赛事、提升能力，激发学生的科学热情，铸造领导力和创新思维'
                }
            ],
            tools: {
                description: '为了更好地进行赛事数据分析和战略规划，我们开发了专业的 Scouting 系统：',
                items: [
                    { icon: '📋', name: 'PreScouting', color: '#667eea', description: '赛前数据收集与团队评估' },
                    { icon: '📊', name: 'Scouting', color: '#764ba2', description: '现场实时数据记录与分析' },
                    { icon: '📈', name: 'Analysis', color: '#667eea', description: '数据可视化与战略决策支持' }
                ]
            }
        };

        function getHomePageContent() {
            const saved = localStorage.getItem('homepage_content');
            if (saved) return JSON.parse(saved);
            localStorage.setItem('homepage_content', JSON.stringify(DEFAULT_HOMEPAGE_CONTENT));
            return JSON.parse(JSON.stringify(DEFAULT_HOMEPAGE_CONTENT));
        }

        function saveHomePageContent(content) {
            localStorage.setItem('homepage_content', JSON.stringify(content));
        }

        async function submitLocalPrescout(id) {
            const entries = getLocalPrescoutData();
            const entry = entries.find(e => e.id === id);
            if (!entry) return;

            const response = await apiFetch('/api/prescout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });

            if (!response.ok) {
                alert('提交失败');
                return;
            }

            const filtered = entries.filter(e => e.id !== id);
            saveLocalPrescoutData(filtered);
            renderEntries();
        }

        async function submitLocalScouting(id) {
            const entries = getLocalScoutingData();
            const entry = entries.find(e => e.id === id);
            if (!entry) return;

            const response = await apiFetch('/api/scouting', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });

            if (!response.ok) {
                alert('提交失败');
                return;
            }

            const filtered = entries.filter(e => e.id !== id);
            saveLocalScoutingData(filtered);
            showScoutingData();
        }

        async function getPrescoutEntries(eventFilter = '') {
            if (isAdmin()) {
                const url = eventFilter ? `/api/prescout?event=${encodeURIComponent(eventFilter)}` : '/api/prescout';
                const response = await apiFetch(url);
                return await response.json();
            }

            let entries = getLocalPrescoutData();
            if (eventFilter) {
                entries = entries.filter(e => e.event === eventFilter);
            }
            return entries;
        }

        async function getScoutingEntries(eventFilter = '') {
            if (isAdmin()) {
                const url = eventFilter ? `/api/scouting?event=${encodeURIComponent(eventFilter)}` : '/api/scouting';
                const response = await apiFetch(url);
                return await response.json();
            }

            let entries = getLocalScoutingData();
            if (eventFilter) {
                entries = entries.filter(e => e.event === eventFilter);
            }
            return entries;
        }

        // Cache for loaded HTML
        let headerHTML = '';
        let footerHTML = '';

        // Load external HTML files
        async function loadHeader() {
            if (!headerHTML) {
                const response = await fetch('/header.html');
                headerHTML = await response.text();
            }
            
            // Add account settings link if user is logged in
            let header = headerHTML;
            const isLight = getCurrentTheme() === 'light';
            const themeBtn = `<button class="theme-toggle" onclick="toggleTheme()" title="${isLight ? '切换到夜间模式' : '切换到白天模式'}" aria-label="${isLight ? '切换到夜间模式' : '切换到白天模式'}">${isLight ? '☀️' : '🌙'}</button>`;
            if (currentUser) {
                header = headerHTML.replace(
                    '</nav>',
                    `<a href="#account/profile" class="header-account-link">👤 账户</a>${themeBtn}</nav>`
                );
            } else {
                header = headerHTML.replace('</nav>', `${themeBtn}</nav>`);
            }
            return header;
        }

        async function loadFooter() {
            if (!footerHTML) {
                const response = await fetch('/footer.html');
                footerHTML = await response.text();
            }
            return footerHTML;
        }

        // Router
        function navigate(hash) {
            window.location.hash = hash;
        }

        async function renderApp() {
            const app = document.getElementById('app');
            let hash = window.location.hash || '#home';
            const mobileToggle = document.getElementById('mobileToggle');

            // Redirect #tools to #tools/prescouting by default
            if (hash === '#tools') {
                hash = '#tools/prescouting';
                window.history.replaceState(null, '', hash);
            }

            // Redirect #account to #account/profile by default
            if (hash === '#account') {
                hash = '#account/profile';
                window.history.replaceState(null, '', hash);
            }

            // Redirect #seasons to #seasons/2026 by default
            if (hash === '#seasons') {
                hash = '#seasons/2026';
                window.history.replaceState(null, '', hash);
            }

            // Only require login for tools pages
            if (!currentUser && hash.startsWith('#tools')) {
                if (mobileToggle) mobileToggle.style.display = 'flex';
                renderLogin();
                return;
            }

            if (hash === '#login') {
                if (mobileToggle) mobileToggle.style.display = 'none';
                renderLogin();
            } else if (hash.startsWith('#account')) {
                if (mobileToggle) mobileToggle.style.display = 'none';
                if (currentUser) {
                    await renderAccountDashboard();
                } else {
                    window.location.hash = '#login';
                }
            } else if (hash.startsWith('#tools')) {
                if (mobileToggle) mobileToggle.style.display = 'flex';
                await renderToolsLayout(hash);
            } else if (hash.startsWith('#seasons')) {
                if (mobileToggle) mobileToggle.style.display = 'none';
                await renderSeasonsLayout(hash);
            } else {
                if (mobileToggle) mobileToggle.style.display = 'none';
                await renderHome();
            }
        }

        function renderLogin() {
            const app = document.getElementById('app');
            const returnTo = window.location.hash || '#home';
            app.innerHTML = `
                <div class="login-container">
                    <h1>FRC Team 9597</h1>
                    <h2>登录</h2>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="输入密码" onkeypress="if(event.key==='Enter')login('${returnTo}')">
                    </div>
                    <button onclick="login('${returnTo}')">登录</button>
                    <div class="login-links">
                        <a href="#home">返回主页</a>
                        <span class="divider">|</span>
                        <a href="#" onclick="loginAsTester('${returnTo}'); return false;">使用测试账户（tester）</a>
                    </div>
                </div>
            `;
        }

        async function login(returnTo = '#home') {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            if (isTesterUser(username)) {
                // tester continues to use local mode
                const savedPassword = localStorage.getItem(`password_${username}`);
                if (password !== TESTER_PASS && password !== savedPassword) {
                    alert('用户名或密码错误');
                    return;
                }

                currentUser = username;
                currentRole = 'tester';
                currentToken = '';
                localStorage.setItem('frc_user', username);
                localStorage.setItem('frc_role', 'tester');
                localStorage.removeItem('frc_token');
            } else {
                // all non-tester accounts are database-backed
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                if (!response.ok || !result?.ok) {
                    alert(result?.error || '用户名或密码错误');
                    return;
                }

                currentUser = result.username;
                currentRole = result.role || 'admin';
                currentToken = result.token || '';
                localStorage.setItem('frc_user', currentUser);
                localStorage.setItem('frc_role', currentRole);
                if (currentToken) {
                    localStorage.setItem('frc_token', currentToken);
                } else {
                    localStorage.removeItem('frc_token');
                }
            }

            // Redirect to prescouting if returnTo is login or tools
            if (returnTo === '#login' || returnTo === '#tools') {
                window.location.hash = '#tools/prescouting';
            } else {
                window.location.hash = returnTo;
            }
            // Manually trigger render to ensure page updates
            await renderApp();
        }

        async function loginAsTester(returnTo = '#home') {
            currentUser = TESTER_USER;
            currentRole = 'tester';
            currentToken = '';
            localStorage.setItem('frc_user', TESTER_USER);
            localStorage.setItem('frc_role', 'tester');
            localStorage.removeItem('frc_token');

            if (returnTo === '#login' || returnTo === '#tools') {
                window.location.hash = '#tools/prescouting';
            } else {
                window.location.hash = returnTo;
            }
            await renderApp();
        }

        function logout() {
            currentUser = null;
            currentRole = null;
            currentToken = null;
            localStorage.removeItem('frc_user');
            localStorage.removeItem('frc_role');
            localStorage.removeItem('frc_token');
            navigate('#home');
        }

        async function renderAccountDashboard() {
            const app = document.getElementById('app');
            const accountSection = window.location.hash.replace('#account', '') || '/profile';
            
            app.innerHTML = `
                ${await loadHeader()}
                <div class="container">
                    <div class="sidebar" id="accountSidebar">
                        <h3>账户</h3>
                        <ul>
                            <li><a href="#account/profile" class="${accountSection === '/profile' ? 'active' : ''}">👤 个人信息</a></li>
                            <li><a href="#account/password" class="${accountSection === '/password' ? 'active' : ''}">🔐 修改密码</a></li>
                            ${isAdmin() ? `<li><a href="#account/users" class="${accountSection === '/users' ? 'active' : ''}">👥 用户管理</a></li>` : ''}
                            ${isAdmin() ? `<li><a href="#account/content" class="${accountSection === '/content' ? 'active' : ''}">📝 编辑主页</a></li>` : ''}
                            <li class="sidebar-home-link"><a href="#home">返回主页</a></li>
                            <li><a href="#" onclick="logout()">登出</a></li>
                        </ul>
                    </div>
                    <div class="content" id="accountContent">
                        ${renderAccountContent(accountSection)}
                    </div>
                </div>
                ${await loadFooter()}
            `;

            // Setup event listeners
            setTimeout(function() {
                if (accountSection === '/profile') {
                    setupProfileEventListeners();
                } else if (accountSection === '/password') {
                    const changePasswordBtn = document.getElementById('changePasswordBtn');
                    if (changePasswordBtn) {
                        changePasswordBtn.addEventListener('click', changePassword);
                    }
                } else if (accountSection === '/content') {
                    setupContentEditorListeners();
                } else if (accountSection === '/users') {
                    setupUserManagementListeners();
                }
            }, 100);
        }

        function renderAccountContent(section) {
            if (section === '/password') {
                return `
                    <h1>🔐 修改密码</h1>
                    <div class="account-password-card">
                        <div class="form-group">
                            <label class="account-label-strong">当前密码</label>
                            <input type="password" id="currentPassword" placeholder="输入当前密码" class="account-input">
                        </div>
                        <div class="form-group">
                            <label class="account-label-strong">新密码</label>
                            <input type="password" id="newPassword" placeholder="输入新密码（至少6个字符）" class="account-input">
                        </div>
                        <div class="form-group">
                            <label class="account-label-strong">确认新密码</label>
                            <input type="password" id="confirmPassword" placeholder="确认新密码" class="account-input">
                        </div>
                        <button id="changePasswordBtn" class="account-btn-primary">确认修改密码</button>
                    </div>
                `;
            } else if (section === '/content') {
                const content = getHomePageContent();
                return `
                    <h1>📝 编辑主页内容</h1>
                    <div class="content-editor-card">
                        <div class="form-group">
                            <label class="content-editor-label">第一段</label>
                            <textarea id="aboutP1" class="content-editor-textarea">${content.aboutUs.p1}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="content-editor-label">第二段</label>
                            <textarea id="aboutP2" class="content-editor-textarea">${content.aboutUs.p2}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="content-editor-label">第三段</label>
                            <textarea id="aboutP3" class="content-editor-textarea">${content.aboutUs.p3}</textarea>
                        </div>
                        
                        <h2 class="content-editor-subtitle content-editor-subtitle-feature">特性卡片</h2>
                        <div id="featuresEditor"></div>
                        
                        <h2 class="content-editor-subtitle content-editor-subtitle-tools">💡 我们的工具</h2>
                        <div class="form-group">
                            <label class="content-editor-label">工具描述</label>
                            <textarea id="toolsDescription" class="content-editor-textarea content-editor-textarea-tools">${content.tools.description}</textarea>
                        </div>
                        <div id="toolsEditor"></div>
                        
                        <div class="content-editor-actions">
                            <button id="saveContentBtn" class="content-editor-btn content-editor-btn-save">保存更改</button>
                            <button id="resetContentBtn" class="content-editor-btn content-editor-btn-reset">重置为默认</button>
                        </div>
                    </div>
                `;
            } else if (section === '/users') {
                return `
                    <h1>👥 用户管理</h1>
                    <div class="users-card">
                        <h2 class="users-section-title">添加账户（数据库）</h2>
                        <div class="users-add-grid">
                            <input type="text" id="newUsername" placeholder="用户名（不能是 tester）" />
                            <input type="password" id="newPassword" placeholder="初始密码" />
                            <select id="newRole">
                                <option value="admin">admin</option>
                                <option value="tester">tester</option>
                            </select>
                            <button id="addUserBtn">添加账户</button>
                        </div>
                        <h2 class="users-section-title">所有账户</h2>
                        <div id="usersList"></div>
                    </div>
                `;
            } else { // /profile
                const nickname = localStorage.getItem(`nickname_${currentUser}`) || '';
                return `
                    <h1>👤 个人信息</h1>
                    <div class="profile-card">
                        <div class="profile-section">
                            <p class="profile-label">
                                <strong>用户名</strong>
                            </p>
                            <p class="profile-value">${currentUser}</p>
                        </div>
                        <div class="profile-section">
                            <p class="profile-label">
                                <strong>昵称</strong>
                            </p>
                            <div class="nickname-row" id="nicknameSection">
                                <p class="nickname-display" id="nicknameDisplay">${nickname || '未设置'}</p>
                                <button id="editNicknameBtn" class="btn-nickname btn-nickname-edit">编辑昵称</button>
                            </div>
                        </div>
                        <div class="profile-section">
                            <p class="profile-label">
                                <strong>账户角色</strong>
                            </p>
                            <p class="profile-value">${currentRole === 'admin' ? '👑 管理员' : '👤 测试员'}</p>
                        </div>
                        <div class="profile-section">
                            <p class="profile-label">
                                <strong>账户状态</strong>
                            </p>
                            <p class="profile-value-success">✅ 活跃</p>
                        </div>
                    </div>
                    <div class="profile-tips-card">
                        <h2 class="profile-tips-title">💡 建议</h2>
                        <ul class="profile-tips-list">
                            <li>定期修改密码以保护账户安全</li>
                            <li>设置一个昵称来个性化您的账户</li>
                            <li>请勿与他人共享账户信息</li>
                        </ul>
                    </div>
                `;
            }
        }

        function setupProfileEventListeners() {
            const editNicknameBtn = document.getElementById('editNicknameBtn');
            if (editNicknameBtn) {
                editNicknameBtn.addEventListener('click', showNicknameEditor);
            }
        }

        function showNicknameEditor() {
            const nickname = localStorage.getItem(`nickname_${currentUser}`) || '';
            const nicknameSection = document.getElementById('nicknameSection');
            
            nicknameSection.innerHTML = `
                <input type="text" id="nicknameInput" placeholder="输入昵称（1-20个字符）" value="${nickname}" class="nickname-input">
                <button id="saveNicknameBtn" class="btn-nickname btn-nickname-save">保存</button>
                <button id="cancelNicknameBtn" class="btn-nickname btn-nickname-cancel">取消</button>
            `;
            
            document.getElementById('nicknameInput').focus();
            document.getElementById('saveNicknameBtn').addEventListener('click', saveNickname);
            document.getElementById('cancelNicknameBtn').addEventListener('click', cancelNicknameEdit);
        }

        function saveNickname() {
            const nicknameInput = document.getElementById('nicknameInput');
            const nickname = nicknameInput.value.trim();
            
            if (!nickname) {
                alert('昵称不能为空');
                return;
            }
            
            if (nickname.length > 20) {
                alert('昵称长度不能超过20个字符');
                return;
            }
            
            localStorage.setItem(`nickname_${currentUser}`, nickname);
            alert('昵称已成功修改');
            
            // Refresh the profile section
            const nicknameDisplay = document.getElementById('nicknameDisplay');
            const nicknameSection = document.getElementById('nicknameSection');
            nicknameSection.innerHTML = `
                <p class="nickname-display" id="nicknameDisplay">${nickname}</p>
                <button id="editNicknameBtn" class="btn-nickname btn-nickname-edit">编辑昵称</button>
            `;
            setupProfileEventListeners();
        }

        function cancelNicknameEdit() {
            const nickname = localStorage.getItem(`nickname_${currentUser}`) || '';
            const nicknameSection = document.getElementById('nicknameSection');
            nicknameSection.innerHTML = `
                <p class="nickname-display" id="nicknameDisplay">${nickname || '未设置'}</p>

        async function getAllUsers() {
            try {
                const response = await apiFetch('/api/users');
                const dbUsers = response.ok ? await response.json() : [];
                const normalized = Array.isArray(dbUsers) ? dbUsers.map(user => ({
                    username: user.username,
                    role: user.role || 'admin',
                    isSystemUser: user.username === ADMIN_USER
                })) : [];

                const hasTester = normalized.some(user => user.username === TESTER_USER);
                if (!hasTester) {
                    normalized.push({ username: TESTER_USER, role: 'tester', isSystemUser: true });
                }

                return normalized;
            } catch (err) {
                console.error('Error loading users:', err);
                return [
                    { username: TESTER_USER, role: 'tester', isSystemUser: true }
                ];
            }
        }

        async function addUser() {
            const usernameInput = document.getElementById('newUsername');
            const passwordInput = document.getElementById('newPassword');
            const roleInput = document.getElementById('newRole');

            const username = (usernameInput?.value || '').trim();
            const password = passwordInput?.value || '';
            const role = roleInput?.value || 'admin';

            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }

            if (isTesterUser(username)) {
                alert('tester 为本地测试账户，不能添加到数据库');
                return;
            }

            const response = await apiFetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });

            const result = await response.json();
            if (!response.ok || !result?.ok) {
                alert(result?.error || '添加账户失败');
                return;
            }

            usernameInput.value = '';
            passwordInput.value = '';
            roleInput.value = 'admin';
            alert('账户添加成功');
            await setupUserManagementListeners();
        }

        function editUserNickname(username) {
            const nickname = localStorage.getItem(`nickname_${username}`) || '';
            const newNickname = prompt(`编辑 ${username} 的昵称：`, nickname);
            
            if (newNickname === null) return; // User cancelled
            
            const trimmedNickname = newNickname.trim();
            
            if (trimmedNickname === '') {
                localStorage.removeItem(`nickname_${username}`);
                alert('昵称已清除');
            } else if (trimmedNickname.length > 20) {
                alert('昵称长度不能超过20个字符');
                return;
            } else {
                localStorage.setItem(`nickname_${username}`, trimmedNickname);
                alert('昵称已修改');
            }
            
            // Refresh the users list
            setupUserManagementListeners();
        }

        async function resetUserPassword(username) {
            if (!confirm(`确定要重置 ${username} 的密码吗？`)) {
                return;
            }

            if (isTesterUser(username)) {
                localStorage.removeItem(`password_${username}`);
                alert(`${username} 的密码已重置为默认密码`);
                return;
            }

            const users = await getAllUsers();
            const target = users.find(u => u.username === username);
            if (!target) {
                alert('用户不存在');
                return;
            }

            const defaultPassword = username === ADMIN_USER ? ADMIN_PASS : TESTER_PASS;
            const response = await apiFetch('/api/users', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, role: target.role || 'admin', password: defaultPassword })
            });

            const result = await response.json();
            if (!response.ok || !result?.ok) {
                alert(result?.error || '重置密码失败');
                return;
            }

            alert(`${username} 的密码已重置为默认密码`);
        }

        async function deleteUser(username) {
            if (!confirm(`确定要删除用户 ${username} 吗？此操作无法撤销！`)) {
                return;
            }
            
            if (!confirm(`再次确认：删除 ${username} 将清除其所有数据！`)) {
                return;
            }

            if (isTesterUser(username)) {
                alert('tester 为系统本地测试账户，不能删除');
                return;
            }

            const response = await apiFetch(`/api/users?username=${encodeURIComponent(username)}`, {
                method: 'DELETE'
            });
            const result = await response.json();
            if (!response.ok || !result?.ok) {
                alert(result?.error || '删除失败');
                return;
            }

            localStorage.removeItem(`password_${username}`);
            localStorage.removeItem(`nickname_${username}`);
            alert(`用户 ${username} 已删除`);
            
            // Refresh the users list
            await setupUserManagementListeners();
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!currentPassword || !newPassword || !confirmPassword) {
                alert('请填写所有密码字段');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('新密码与确认密码不一致');
                return;
            }

            if (newPassword.length < 6) {
                alert('新密码至少需要6个字符');
                return;
            }

            if (isTesterUser(currentUser)) {
                const savedPassword = localStorage.getItem(`password_${currentUser}`);
                const defaultPassword = TESTER_PASS;
                const isPasswordValid = currentPassword === defaultPassword || currentPassword === savedPassword;

                if (!isPasswordValid) {
                    alert('当前密码错误');
                    return;
                }

                localStorage.setItem(`password_${currentUser}`, newPassword);
                alert('密码已成功修改');
            } else {
                const response = await apiFetch('/api/users/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser, currentPassword, newPassword })
                });
                const result = await response.json();
                if (!response.ok || !result?.ok) {
                    alert(result?.error || '修改密码失败');
                    return;
                }
                alert('密码已成功修改');
            }
            
            // Clear password fields
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

            return types[type] || type;
        }

        function getScoutingConfig() {
            const savedConfig = localStorage.getItem('scouting_config');
            if (savedConfig) {
                return JSON.parse(savedConfig);
            }
            // Load default template on first use
            const defaultTemplate = getDefaultTemplate();
            saveScoutingConfig({ fields: defaultTemplate.fields });
            return { fields: defaultTemplate.fields };
        }

        function getDefaultTemplate() {
            return {
                name: '默认比赛模板',

        function getScoutingTemplates() {
            const templates = localStorage.getItem('scouting_templates');
            return templates ? JSON.parse(templates) : [];
        }

        function saveScoutingTemplates(templates) {
            localStorage.setItem('scouting_templates', JSON.stringify(templates));
        }

        function loadTemplate(templateName) {
            if (templateName === '默认比赛模板') {
                const defaultTemplate = getDefaultTemplate();
                saveScoutingConfig({ fields: defaultTemplate.fields });
                showScoutingConfig();
                return;
            }
            
            const templates = getScoutingTemplates();
            const template = templates.find(t => t.name === templateName);
            if (template) {
                saveScoutingConfig({ fields: template.fields });
                showScoutingConfig();
            }
        }

        function saveAsTemplate() {
            const config = getScoutingConfig();
            const templateName = prompt('请输入模板名称：');
            
            if (!templateName) return;
            
            const templates = getScoutingTemplates();
            
            // Check if name already exists
            if (templates.find(t => t.name === templateName) || templateName === '默认比赛模板') {
                alert('模板名称已存在，请使用其他名称');
                return;
            }
            
            templates.push({
                name: templateName,
                fields: config.fields
            });
            
            saveScoutingTemplates(templates);
            alert('模板保存成功！');
            showScoutingConfig();
        }

        function addScoutingField() {
            const content = document.getElementById('scouting-content');
            content.innerHTML = `

                <div class="form-group">
                    <label>字段标签</label>
                    <input type="text" id="field-label" placeholder="例如: Auto Score">
                </div>

                    <select id="field-type" onchange="toggleOptionsField()">
                        <option value="text">文本</option>
                        <option value="number">数字</option>
                        <option value="radio">单选</option>
                        <option value="checkbox">多选</option>
                    </select>
                </div>
                <div class="form-group options-hidden" id="options-group">
                    <label>选项（用逗号分隔）</label>
                    <input type="text" id="field-options" placeholder="例如: 选项1, 选项2, 选项3">
                </div>

                <button onclick="showScoutingConfig()">取消</button>
            `;
        }

        function toggleOptionsField() {
            const type = document.getElementById('field-type').value;
            const optionsGroup = document.getElementById('options-group');
            if (!optionsGroup) return;
            if (type === 'radio' || type === 'checkbox') {
                optionsGroup.classList.remove('options-hidden');
            } else {
                optionsGroup.classList.add('options-hidden');
            }
        }

        function saveNewScoutingField() {
            const label = document.getElementById('field-label').value;
            const id = document.getElementById('field-id').value;
            const type = document.getElementById('field-type').value;
            const required = document.getElementById('field-required').checked;
            const optionsInput = document.getElementById('field-options')?.value || '';

            if (!label || !id) {
                alert('请填写字段标签和ID');
                return;
            }

            const field = { id, label, type, required };
            
            if (type === 'radio' || type === 'checkbox') {
                if (!optionsInput) {
                    alert('请填写选项');
                    return;
                }
                field.options = optionsInput.split(',').map(o => o.trim());
            }

            const config = getScoutingConfig();
            config.fields.push(field);
            saveScoutingConfig(config);
            
            showScoutingConfig();
        }

        function editScoutingField(index) {
            const config = getScoutingConfig();
            const field = config.fields[index];
            
            const content = document.getElementById('scouting-content');
            content.innerHTML = `

                    <select id="field-type" onchange="toggleOptionsField()">
                        <option value="text" ${field.type === 'text' ? 'selected' : ''}>文本</option>

                        <option value="radio" ${field.type === 'radio' ? 'selected' : ''}>单选</option>

                    </select>
                </div>
                <div class="form-group${field.type === 'radio' || field.type === 'checkbox' ? '' : ' options-hidden'}" id="options-group">

                    <label>
                        <input type="checkbox" id="field-required" ${field.required ? 'checked' : ''}> 必填字段

        function updateScoutingField(index) {
            const label = document.getElementById('field-label').value;
            const type = document.getElementById('field-type').value;
            const required = document.getElementById('field-required').checked;
            const optionsInput = document.getElementById('field-options')?.value || '';

            if (!label) {
                alert('请填写字段标签');
                return;
            }

            const config = getScoutingConfig();
            config.fields[index].label = label;
            config.fields[index].type = type;
            config.fields[index].required = required;
            
            if (type === 'radio' || type === 'checkbox') {
                if (!optionsInput) {
                    alert('请填写选项');
                    return;
                }
                config.fields[index].options = optionsInput.split(',').map(o => o.trim());
            } else {
                delete config.fields[index].options;
            }

            saveScoutingConfig(config);
            showScoutingConfig();
        }

        function deleteScoutingField(index) {
            if (!confirm('确定要删除这个字段吗？')) return;
            
            const config = getScoutingConfig();
            config.fields.splice(index, 1);
            saveScoutingConfig(config);
            showScoutingConfig();
        }

        function showScoutingForm() {
            const config = getScoutingConfig();
            const content = document.getElementById('scouting-content');
            
            let formHTML = '<h2>数据收集</h2><form id="scouting-form">';
            
            config.fields.forEach(field => {
                formHTML += `<div class="form-group">`;
                formHTML += `<label>${field.label}${field.required ? ' *' : ''}</label>`;
                
                if (field.type === 'text') {
                    formHTML += `<input type="text" id="field-${field.id}" ${field.required ? 'required' : ''}>`;
                } else if (field.type === 'number') {
                    formHTML += `<input type="number" step="any" id="field-${field.id}" ${field.required ? 'required' : ''}>`;
                } else if (field.type === 'radio' && field.options) {
                    field.options.forEach((option, idx) => {
                        formHTML += `
                            <div>
                                <label class="label-normal">
                                    <input type="radio" name="field-${field.id}" value="${option}" ${field.required && idx === 0 ? 'required' : ''}>
                                    ${option}
                                </label>
                            </div>`;
                    });
                } else if (field.type === 'checkbox' && field.options) {
                    field.options.forEach(option => {
                        formHTML += `
                            <div>
                                <label class="label-normal">
                                    <input type="checkbox" name="field-${field.id}" value="${option}">
                                    ${option}
                                </label>
                            </div>`;
                    });
                }
                
                formHTML += `</div>`;
            });
            
            formHTML += `
                <button type="button" onclick="submitScoutingData()">提交</button>
                <button type="button" onclick="showScoutingData()">查看数据</button>
            </form>`;
            
            content.innerHTML = formHTML;
        }

        async function submitScoutingData() {
            const config = getScoutingConfig();
            const data = { ts: Date.now() };
            
            for (const field of config.fields) {
                if (field.type === 'checkbox') {
                    const checkboxes = document.querySelectorAll(`input[name="field-${field.id}"]:checked`);
                    data[field.id] = Array.from(checkboxes).map(cb => cb.value);
                } else if (field.type === 'radio') {
                    const radio = document.querySelector(`input[name="field-${field.id}"]:checked`);
                    data[field.id] = radio ? radio.value : '';
                } else {
                    const input = document.getElementById(`field-${field.id}`);
                    data[field.id] = input ? input.value : '';
                }
                
                if (field.required && (!data[field.id] || (Array.isArray(data[field.id]) && data[field.id].length === 0))) {
                    alert(`请填写必填字段: ${field.label}`);
                    return;
                }
            }

            if (isAdmin()) {
                const response = await apiFetch('/api/scouting', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    alert('提交失败');
                    return;
                }
            } else {
                const scoutingData = getLocalScoutingData();
                data.id = crypto.randomUUID();
                scoutingData.push(data);
                saveLocalScoutingData(scoutingData);
            }

            alert(isAdmin() ? '数据提交成功！' : '数据提交成功（本地保存）！');
            showScoutingForm();
        }

            if (scoutingData.length === 0) {
                content.innerHTML = `
                    <h2>收集的数据</h2>
                    <p>暂无数据</p>
                    <button onclick="showScoutingForm()">开始收集</button>
                `;
                return;
            }

            let html = `
                <h2>收集的数据</h2>
                <button onclick="showScoutingForm()" class="btn-mb-15">继续收集</button>
                <button onclick="exportScoutingData()" class="btn-mb-15 btn-ml-10">导出数据</button>
            `;
            
            scoutingData.reverse().forEach((entry, index) => {
                html += `<div class="entry-card">`;
                html += `<h3>记录 #${scoutingData.length - index}</h3>`;
                html += `<div class="entry-detail">`;
                
                config.fields.forEach(field => {
                    const value = entry[field.id];
                    let displayValue = '';
                    
                    if (Array.isArray(value)) {
                        displayValue = value.join(', ');
                    } else {
                        displayValue = value || '-';
                    }
                    
                    html += `<div class="detail-item"><strong>${field.label}:</strong> ${displayValue}</div>`;
                });
                
                html += `<div class="detail-item"><strong>提交时间:</strong> ${new Date(entry.ts).toLocaleString()}</div>`;
                html += `</div>`;
                if (!isAdmin()) {
                    html += `<button onclick="deleteScoutingEntry('${entry.id}')">删除</button>`;
                }
                html += `</div>`;
            });
            
            content.innerHTML = html;

            if (isAdmin()) {
                const localEntries = getLocalScoutingData();
                if (localEntries.length === 0) return;

                let localHtml = `
                    <h3 class="section-title-top-24">本地数据（待提交）</h3>
                `;

                localEntries.forEach((entry, index) => {
                    localHtml += `<div class="entry-card">`;
                    localHtml += `<h3>本地记录 #${index + 1}</h3>`;
                    localHtml += `<div class="entry-detail">`;

                    config.fields.forEach(field => {
                        const value = entry[field.id];
                        let displayValue = '';

                        if (Array.isArray(value)) {
                            displayValue = value.join(', ');
                        } else {
                            displayValue = value || '-';
                        }

                        localHtml += `<div class="detail-item"><strong>${field.label}:</strong> ${displayValue}</div>`;
                    });

                    localHtml += `<div class="detail-item"><strong>提交时间:</strong> ${new Date(entry.ts || Date.now()).toLocaleString()}</div>`;
                    localHtml += `</div>`;
                    localHtml += `<button onclick="submitLocalScouting('${entry.id}')" class="btn-mt-10">提交到服务器</button>`;
                    localHtml += `</div>`;
                });

                content.innerHTML += localHtml;
            }
        }

        function deleteScoutingEntry(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            const scoutingData = getLocalScoutingData();
            const filtered = scoutingData.filter(entry => entry.id !== id);
            saveLocalScoutingData(filtered);
            showScoutingData();
        }

        async function exportScoutingData() {
            const config = getScoutingConfig();
            const scoutingData = await getScoutingEntries('');
            
            if (scoutingData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            // Create CSV
            let csv = config.fields.map(f => f.label).join(',') + ',提交时间\\n';
            
            scoutingData.forEach(entry => {
                const row = config.fields.map(field => {
                    const value = entry[field.id];
                    if (Array.isArray(value)) {
                        return `"${value.join('; ')}"`;
                    }
                    return `"${value || ''}"`;
                }).join(',');
                csv += row + ',' + new Date(entry.ts).toLocaleString() + '\\n';
            });

            // Download
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `scouting_data_${Date.now()}.csv`;
            link.click();
        }

        function renderAnalysis() {
            return `
                <h1>Analysis</h1>
                <div class="analysis-toolbar">
                    <button onclick="showAnalysisOverview()">数据总览</button>
                    <button onclick="showTeamComparison()">赛队对比</button>
                </div>
                <div id="analysis-content">
                    <p>点击上方按钮查看数据分析。</p>
                </div>
            `;
        }

                                            if (Array.isArray(value)) {

        async function showTeamDetail(teamNumber) {

            }

            content.innerHTML = '<p>加载中...</p>';
            
            // Get PreScouting data for this team
            const allPreScout = await getPrescoutEntries('');

            // Get Scouting data for this team

            const teamScouting = allScouting.filter(entry => entry.team === teamNumber);

                <div class="analysis-toolbar">
                    <button onclick="showAnalysisOverview()">← 返回总览</button>
                </div>
                <h2>赛队 ${teamNumber} 详细数据</h2>
                <p>PreScouting: ${teamPreScout.length} 条 | Scouting: ${teamScouting.length} 条</p>

                        <div class="entry-card">

                            <div class="entry-detail">

                                <div class="detail-item"><strong>Collector:</strong> ${entry.collector}</div>
                                <div class="detail-item"><strong>Practice:</strong> ${entry.practice}h</div>
                                <div class="detail-item"><strong>Competitions:</strong> ${entry.compCount}</div>

                        <div class="entry-card">
                            <h3>记录 #${index + 1}</h3>
                            <div class="entry-detail">

        async function showTeamComparison() {
            const content = document.getElementById('analysis-content');
            content.innerHTML = '<p>加载中...</p>';
            
            // Get all data
            const preScoutData = await getPrescoutEntries('');
            const scoutingData = await getScoutingEntries('');
            
            // Build team list
            const teamsMap = new Map();
            
            preScoutData.forEach(entry => {
                if (!teamsMap.has(entry.teamNumber)) {
                    teamsMap.set(entry.teamNumber, {
                        number: entry.teamNumber,
                        name: entry.teamName,
                        preScoutCount: 0,
                        scoutingCount: 0
                    });
                }
                teamsMap.get(entry.teamNumber).preScoutCount++;
            });
            
            scoutingData.forEach(entry => {
                const teamNum = entry.team || '';
                if (teamNum) {
                    if (!teamsMap.has(teamNum)) {
                        teamsMap.set(teamNum, {
                            number: teamNum,
                            name: '-',
                            preScoutCount: 0,
                            scoutingCount: 0
                        });
                    }
                    teamsMap.get(teamNum).scoutingCount++;
                }
            });
            
            const teams = Array.from(teamsMap.values()).sort((a, b) => {
                const numA = parseInt(a.number) || 0;
                const numB = parseInt(b.number) || 0;
                return numA - numB;
            });
            
            let html = `
                <h2>赛队对比</h2>
                <p>共 ${teams.length} 支赛队</p>
                
                <div class="analysis-table-wrap analysis-table-wrap-gap">
                    <table class="analysis-table">
                        <thead>
                            <tr class="analysis-table-head-gradient">
                                <th>队号</th>
                                <th>队名</th>
                                <th class="analysis-cell-center">PreScouting 记录</th>
                                <th class="analysis-cell-center">Scouting 记录</th>
                                <th class="analysis-cell-center">总记录数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${teams.map(team => {
                                const total = team.preScoutCount + team.scoutingCount;
                                return `
                                    <tr class="analysis-row">
                                        <td class="analysis-cell analysis-cell-strong">${team.number}</td>
                                        <td class="analysis-cell">${team.name}</td>
                                        <td class="analysis-cell analysis-cell-center">${team.preScoutCount}</td>
                                        <td class="analysis-cell analysis-cell-center">${team.scoutingCount}</td>
                                        <td class="analysis-cell analysis-cell-center analysis-cell-strong">${total}</td>
                                        <td class="analysis-cell">
                                            <button onclick="showTeamDetail('${team.number}')" class="analysis-btn-sm">查看详情</button>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            content.innerHTML = html;
        }

        function renderPreScouting() {
            const eventOptions = getEventOptions();
            const defaultEvent = eventOptions[0] || '';
            const eventOptionsHtml = eventOptions.map(e => `<option value="${e}" ${e === defaultEvent ? 'selected' : ''}>${e}</option>`).join('');
            return `
                <h1>PreScouting</h1>
                <div class="form-group">
                    <label>Event</label>
                    <select id="prescout-event" onchange="handleEventChange()">
                        <option value="">选择赛事</option>
                        ${eventOptionsHtml}
                        <option value="__custom__">添加自定义...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Collector</label>
                    <input type="text" id="prescout-collector" placeholder="收集者姓名" value="${currentUser || ''}">
                </div>
                <div class="form-group">
                    <label>Team Number</label>
                    <input type="text" id="prescout-team-number" placeholder="队伍编号">
                </div>
                <div class="form-group">
                    <label>Team Name</label>
                    <input type="text" id="prescout-team-name" placeholder="队伍名称">
                </div>
                <div class="form-group">
                    <label>Operator Practice Duration (hours)</label>
                    <input type="text" id="prescout-practice" placeholder="例如: 50">
                </div>
                <div class="form-group">
                    <label>Competition Count</label>
                    <input type="number" id="prescout-comp-count" placeholder="参加过的比赛数量">
                </div>
                <div class="form-group">
                    <label>Chassis Type</label>
                    <select id="prescout-chassis">
                        <option value="">选择底盘类型</option>
                        <option value="tank">Tank Drive</option>
                        <option value="mecanum">Mecanum</option>
                        <option value="swerve">Swerve</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button onclick="submitPreScouting()">提交</button>

                <h2 class="analysis-subtitle-30">已收集的数据</h2>
                <div class="filter-section">
                    <div class="filter-group">
                        <label>Filter by Event</label>
                        <select id="filter-event" onchange="renderEntries()">
                            <option value="">所有赛事</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Filter by Collector</label>
                        <select id="filter-collector" onchange="renderEntries()">
                            <option value="">所有收集者</option>
                        </select>
                    </div>
                </div>
                <div id="prescout-entries">
                    暂无数据
                </div>
            `;
        }

        function handleEventChange() {
            const select = document.getElementById('prescout-event');
            if (!select) return;
            if (select.value === '__custom__') {
                const name = prompt('请输入赛事名称：');
                if (name) {
                    addEventOption(name);
                    select.innerHTML = '<option value="">选择赛事</option>' +
                        getEventOptions().map(e => `<option value="${e}">${e}</option>`).join('') +
                        '<option value="__custom__">添加自定义...</option>';
                    select.value = name;
                } else {
                    select.value = '';
                }
            }
        }

        async function submitPreScouting() {
            const data = {
                event: document.getElementById('prescout-event').value,
                collector: document.getElementById('prescout-collector').value || currentUser || '',
                teamNumber: document.getElementById('prescout-team-number').value,
                teamName: document.getElementById('prescout-team-name').value,
                practice: document.getElementById('prescout-practice').value,
                compCount: parseInt(document.getElementById('prescout-comp-count').value),
                chassis: document.getElementById('prescout-chassis').value
            };

            if (!data.event || !data.collector || !data.teamNumber || !data.teamName) {
                alert('请填写所有必填字段');
                return;
            }

            if (isAdmin()) {
                const response = await apiFetch('/api/prescout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    alert('提交失败');
                    return;
                }
            } else {
                const entries = getLocalPrescoutData();
                data.id = crypto.randomUUID();
                data.ts = Date.now();
                entries.push(data);
                saveLocalPrescoutData(entries);
            }

            alert(isAdmin() ? '提交成功' : '提交成功（本地保存）');
            // Clear form
            document.getElementById('prescout-collector').value = currentUser || '';
            document.getElementById('prescout-team-number').value = '';
            document.getElementById('prescout-team-name').value = '';
            document.getElementById('prescout-practice').value = '';
            document.getElementById('prescout-comp-count').value = '';
            document.getElementById('prescout-chassis').value = '';
            
            // Refresh entries
            renderEntries();
        }

        async function renderEntries() {
            const eventFilter = document.getElementById('filter-event')?.value || '';
            const collectorFilter = document.getElementById('filter-collector')?.value || '';

            const entries = await getPrescoutEntries(eventFilter);

            // Apply collector filter on frontend
            let filteredEntries = entries;
            if (collectorFilter) {
                filteredEntries = entries.filter(e => e.collector === collectorFilter);
            }

            // Update filter dropdowns
            updateFilterDropdowns(entries);

            const container = document.getElementById('prescout-entries');
            if (!container) return;

            let html = '';

            if (filteredEntries.length === 0) {
                html += '<p>暂无数据</p>';
            } else {
                html += filteredEntries.map(entry => `
                    <div class="entry-card" onclick="showEntryDetail('${entry.id}')">
                        <h3>Team ${entry.teamNumber} - ${entry.teamName}</h3>
                        <div class="entry-detail">
                            <div class="detail-item"><strong>Event:</strong> ${entry.event}</div>
                            <div class="detail-item"><strong>Collector:</strong> ${entry.collector}</div>
                            <div class="detail-item"><strong>Practice:</strong> ${entry.practice}h</div>
                            <div class="detail-item"><strong>Competitions:</strong> ${entry.compCount}</div>
                            <div class="detail-item"><strong>Chassis:</strong> ${entry.chassis}</div>
                        </div>
                    </div>
                `).join('');
            }

            if (isAdmin()) {
                const localEntries = getLocalPrescoutData();
                if (localEntries.length > 0) {
                    html += `
                        <h3 class="section-title-top-24">本地数据（待提交）</h3>
                        ${localEntries.map(entry => `
                            <div class="entry-card">
                                <h3>Team ${entry.teamNumber || '-'} - ${entry.teamName || '-'}</h3>
                                <div class="entry-detail">
                                    <div class="detail-item"><strong>Event:</strong> ${entry.event || '-'}</div>
                                    <div class="detail-item"><strong>Collector:</strong> ${entry.collector || '-'}</div>
                                    <div class="detail-item"><strong>Practice:</strong> ${entry.practice || '-'}h</div>
                                    <div class="detail-item"><strong>Competitions:</strong> ${entry.compCount ?? '-'}</div>
                                    <div class="detail-item"><strong>Chassis:</strong> ${entry.chassis || '-'}</div>
                                </div>
                                <button onclick="submitLocalPrescout('${entry.id}')" class="btn-mt-10">提交到服务器</button>
                            </div>
                        `).join('')}
                    `;
                }
            }

            container.innerHTML = html;
        }

        function updateFilterDropdowns(entries) {
            const eventFilter = document.getElementById('filter-event');
            const collectorFilter = document.getElementById('filter-collector');

            if (!eventFilter || !collectorFilter) return;

            // Get unique events and collectors
            const events = [...new Set(entries.map(e => e.event))];
            const collectors = [...new Set(entries.map(e => e.collector))];

            // Update event dropdown
            const currentEvent = eventFilter.value;
            eventFilter.innerHTML = '<option value="">所有赛事</option>' + 
                events.map(e => `<option value="${e}" ${e === currentEvent ? 'selected' : ''}>${e}</option>`).join('');

            // Update collector dropdown
            const currentCollector = collectorFilter.value;
            collectorFilter.innerHTML = '<option value="">所有收集者</option>' + 
                collectors.map(c => `<option value="${c}" ${c === currentCollector ? 'selected' : ''}>${c}</option>`).join('');
        }

        async function showEntryDetail(id) {
            const entries = await getPrescoutEntries('');
            const entry = entries.find(e => e.id === id);

            if (!entry) {
                alert('未找到该记录');
                return;
            }

            alert(`
Team ${entry.teamNumber} - ${entry.teamName}
Event: ${entry.event}
Collector: ${entry.collector}
Practice Duration: ${entry.practice}h
Competition Count: ${entry.compCount}
Chassis Type: ${entry.chassis}
Submitted: ${new Date(entry.ts).toLocaleString()}
            `);
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('toolsSidebar');
            if (sidebar) {
                sidebar.classList.toggle('active');
            }
        }

        // Initialize
        window.addEventListener('hashchange', renderApp);
        window.addEventListener('load', () => {
            renderApp();
            // Auto-load entries if on prescouting page
            const hash = window.location.hash;
            if (hash === '#tools/prescouting' || hash === '#tools') {
                setTimeout(renderEntries, 500);
            }
        });

        // Auto refresh entries when navigating to prescouting
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash === '#tools/prescouting' || hash === '#tools') {
                setTimeout(renderEntries, 500);
            }
        });
    </script>
</body>
</html>
