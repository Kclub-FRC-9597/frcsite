<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luban Robotics #FRC9597 - A Team From K CLUB</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="app"></div>
    <button class="mobile-toggle" id="mobileToggle" onclick="toggleMobileSidebar()">☰</button>

    <script src="/js/account-templates.js"></script>
    <script src="/js/account.js"></script>
    <script src="/js/sponsors.js"></script>
    <script src="/js/seasons-templates.js"></script>
    <script src="/js/seasons.js"></script>
    <script>
        // Auth state
        let currentUser = localStorage.getItem('frc_user');
        let currentRole = localStorage.getItem('frc_role');
        let currentToken = localStorage.getItem('frc_token');

        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'admin123';
        const ADMIN_TOKEN = 'admin-token-2026';
        const TESTER_USER = 'tester';
        const TESTER_PASS = 'password123';
        const USER_USER = 'user';
        const USER_PASS = 'user123';

        const THEME_KEY = 'frc_theme';

        const DEFAULT_EVENTS = ['Shanghai Regional'];

        // Global variable to store current event's teams for quick lookup
        let currentEventTeams = [];

        function getCurrentTheme() {
            return document.body.classList.contains('light-theme') ? 'light' : 'dark';
        }

        function applyTheme(mode) {
            const isLight = mode === 'light';
            document.body.classList.toggle('light-theme', isLight);
            localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');

            const label = isLight ? '☀️' : '🌙';
            document.querySelectorAll('.theme-toggle').forEach(btn => {
                btn.textContent = label;
                btn.setAttribute('aria-label', isLight ? '切换到夜间模式' : '切换到白天模式');
                btn.setAttribute('title', isLight ? '切换到夜间模式' : '切换到白天模式');
            });
        }

        function toggleTheme() {
            applyTheme(getCurrentTheme() === 'dark' ? 'light' : 'dark');
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            applyTheme(savedTheme === 'light' ? 'light' : 'dark');
        }

        initTheme();

        if (currentUser && !currentRole) {
            currentRole = 'tester';
            localStorage.setItem('frc_role', 'tester');
        }

        function isAdmin() {
            return currentRole === 'admin' && currentToken === ADMIN_TOKEN;
        }

        function isTesterUser(username = currentUser) {
            return username === TESTER_USER;
        }

        function isSystemUser(username = currentUser) {
            return username === TESTER_USER || username === USER_USER;
        }

        function apiFetch(url, options = {}) {
            if (!isAdmin()) {
                return fetch(url, options);
            }
            const headers = new Headers(options.headers || {});
            headers.set('Authorization', `Bearer ${ADMIN_TOKEN}`);
            return fetch(url, { ...options, headers });
        }

        function getLocalPrescoutData() {
            return JSON.parse(localStorage.getItem('prescout_data') || '[]');
        }

        function saveLocalPrescoutData(entries) {
            localStorage.setItem('prescout_data', JSON.stringify(entries));
        }

        function getLocalScoutingData() {
            return JSON.parse(localStorage.getItem('scouting_data') || '[]');
        }

        function saveLocalScoutingData(entries) {
            localStorage.setItem('scouting_data', JSON.stringify(entries));
        }

        function getEventOptions() {
            const saved = localStorage.getItem('event_options');
            if (saved) return JSON.parse(saved);
            localStorage.setItem('event_options', JSON.stringify(DEFAULT_EVENTS));
            return [...DEFAULT_EVENTS];
        }

        function addEventOption(name) {
            if (!name) return;
            const options = getEventOptions();
            if (options.includes(name)) return;
            options.push(name);
            localStorage.setItem('event_options', JSON.stringify(options));
        }

        // Homepage content management
        const DEFAULT_HOMEPAGE_CONTENT = {
            aboutUs: {
                p1: '<strong>Luban Robotics（鲁班机器人）</strong>是一支隶属于 K CLUB 的年轻而富有朝气的 FRC 竞技机器人团队。我们以中国古代伟大工匠鲁班命名，以教育为核心使命，通过机器人竞赛这个平台，致力于激发学生的兴趣、提升学生的能力。',
                p2: '我们的核心理念是：<strong class="home-inline-accent">基于兴趣，依托赛事，提升能力</strong>。自2024年成立以来，我们在学生的科学探索、工程实践和团队协作中，秉承精益求精的工匠精神，打造每一辆竞赛机器人。通过 FIRST Robotics Competition（国际机器人竞赛）的舞台，我们帮助学生在创新、协作和坚持中学会解决真实世界的问题。',
                p3: '我们相信，<strong class="home-inline-accent">教育的价值超越赛场</strong>。无论在成败得失的淬炼中，还是在技术突破的欣喜中，我们都致力于培养学生对科学和工程的热情，铸造他们的领导力、责任感和创新思维，成为未来的技术引领者。'
            },
            features: [
                {
                    icon: '🔧',
                    title: '技术创新',
                    color: '#667eea',
                    description: '融合机械设计、电子工程、编程开发等多学科知识，打造高性能竞赛机器人'
                },
                {
                    icon: '👥',
                    title: '团队协作',
                    color: '#764ba2',
                    description: '培养学生的沟通能力、领导力和团队精神，共同应对挑战，共同成长进步'
                },
                {
                    icon: '🏆',
                    title: '竞赛精神',
                    color: '#667eea',
                    description: '参加 FIRST Robotics Competition，与全球优秀团队切磋交流，追求卓越表现'
                },
                {
                    icon: '📚',
                    title: '教育赋能',
                    color: '#764ba2',
                    description: '基于兴趣、依托赛事、提升能力，激发学生的科学热情，铸造领导力和创新思维'
                }
            ],
            tools: {
                description: '为了更好地进行赛事数据分析和战略规划，我们开发了专业的 Scouting 系统：',
                items: [
                    { icon: '📋', name: 'PreScouting', color: '#667eea', description: '赛前数据收集与团队评估' },
                    { icon: '📊', name: 'Scouting', color: '#764ba2', description: '现场实时数据记录与分析' },
                    { icon: '📈', name: 'Analysis', color: '#667eea', description: '数据可视化与战略决策支持' }
                ]
            }
        };

        function getHomePageContent() {
            const saved = localStorage.getItem('homepage_content');
            if (saved) return JSON.parse(saved);
            localStorage.setItem('homepage_content', JSON.stringify(DEFAULT_HOMEPAGE_CONTENT));
            return JSON.parse(JSON.stringify(DEFAULT_HOMEPAGE_CONTENT));
        }

        function saveHomePageContent(content) {
            localStorage.setItem('homepage_content', JSON.stringify(content));
        }

        async function submitLocalPrescout(id) {
            const entries = getLocalPrescoutData();
            const entry = entries.find(e => e.id === id);
            if (!entry) return;

            const response = await apiFetch('/api/prescout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });

            if (!response.ok) {
                alert('提交失败');
                return;
            }

            const filtered = entries.filter(e => e.id !== id);
            saveLocalPrescoutData(filtered);
            renderEntries();
        }

        async function submitLocalScouting(id) {
            const entries = getLocalScoutingData();
            const entry = entries.find(e => e.id === id);
            if (!entry) return;

            const response = await apiFetch('/api/scouting', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });

            if (!response.ok) {
                alert('提交失败');
                return;
            }

            const filtered = entries.filter(e => e.id !== id);
            saveLocalScoutingData(filtered);
            showScoutingData();
        }

        async function getPrescoutEntries(eventFilter = '') {
            if (isAdmin()) {
                const url = eventFilter ? `/api/prescout?event=${encodeURIComponent(eventFilter)}` : '/api/prescout';
                const response = await apiFetch(url);
                return await response.json();
            }

            let entries = getLocalPrescoutData();
            if (eventFilter) {
                entries = entries.filter(e => e.event === eventFilter);
            }
            return entries;
        }

        async function getScoutingEntries(eventFilter = '') {
            if (isAdmin()) {
                const url = eventFilter ? `/api/scouting?event=${encodeURIComponent(eventFilter)}` : '/api/scouting';
                const response = await apiFetch(url);
                return await response.json();
            }

            let entries = getLocalScoutingData();
            if (eventFilter) {
                entries = entries.filter(e => e.event === eventFilter);
            }
            return entries;
        }

        // Cache for loaded HTML
        let headerHTML = '';
        let footerHTML = '';

        // Load external HTML files
        async function loadHeader() {
            if (!headerHTML) {
                const response = await fetch('/partials/header.html');
                headerHTML = await response.text();
            }
            
            // Add account settings link if user is logged in
            let header = headerHTML;
            const isLight = getCurrentTheme() === 'light';
            const themeBtn = `<button class="theme-toggle" onclick="toggleTheme()" title="${isLight ? '切换到夜间模式' : '切换到白天模式'}" aria-label="${isLight ? '切换到夜间模式' : '切换到白天模式'}">${isLight ? '☀️' : '🌙'}</button>`;
            if (currentUser) {
                header = headerHTML.replace(
                    '</nav>',
                    `<a href="#account/profile" class="header-account-link">👤 账户</a>${themeBtn}</nav>`
                );
            } else {
                header = headerHTML.replace('</nav>', `${themeBtn}</nav>`);
            }
            return header;
        }

        async function loadFooter() {
            if (!footerHTML) {
                const response = await fetch('/partials/footer.html');
                footerHTML = await response.text();
            }
            return footerHTML;
        }

        // Router
        function navigate(hash) {
            window.location.hash = hash;
        }

        async function renderApp() {
            const app = document.getElementById('app');
            let hash = window.location.hash || '#home';
            const mobileToggle = document.getElementById('mobileToggle');

            // Redirect #tools to #tools/prescouting by default
            if (hash === '#tools') {
                hash = '#tools/prescouting';
                window.history.replaceState(null, '', hash);
            }

            // Redirect #account to #account/profile by default
            if (hash === '#account') {
                hash = '#account/profile';
                window.history.replaceState(null, '', hash);
            }

            // Redirect #seasons to #seasons/2026 by default
            if (hash === '#seasons') {
                hash = '#seasons/2026';
                window.history.replaceState(null, '', hash);
            }

            // Only require login for tools pages
            if (!currentUser && hash.startsWith('#tools')) {
                if (mobileToggle) mobileToggle.style.display = 'flex';
                renderLogin();
                return;
            }

            if (hash === '#login') {
                if (mobileToggle) mobileToggle.style.display = 'none';
                renderLogin();
            } else if (hash.startsWith('#account')) {
                if (mobileToggle) mobileToggle.style.display = 'none';
                if (currentUser) {
                    await renderAccountDashboard();
                } else {
                    window.location.hash = '#login';
                }
            } else if (hash.startsWith('#tools')) {
                if (mobileToggle) mobileToggle.style.display = 'flex';
                await renderToolsLayout(hash);
            } else if (hash.startsWith('#seasons')) {
                if (mobileToggle) mobileToggle.style.display = 'none';
                await renderSeasonsLayout(hash);
            } else {
                if (mobileToggle) mobileToggle.style.display = 'none';
                await renderHome();
            }
        }

        function renderLogin() {
            const app = document.getElementById('app');
            const returnTo = window.location.hash || '#home';
            app.innerHTML = `
                <div class="login-container">
                    <h1>FRC Team 9597</h1>
                    <h2>登录</h2>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="输入密码" onkeypress="if(event.key==='Enter')login('${returnTo}')">
                    </div>
                    <button onclick="login('${returnTo}')">登录</button>
                    <div class="login-links">
                        <a href="#home">返回主页</a>
                        <span class="divider">|</span>
                        <a href="#" onclick="loginAsTester('${returnTo}'); return false;">使用测试账户（tester）</a>
                    </div>
                </div>
            `;
        }

        async function login(returnTo = '#home') {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            if (isTesterUser(username)) {
                // tester continues to use local mode
                const savedPassword = localStorage.getItem(`password_${username}`);
                if (password !== TESTER_PASS && password !== savedPassword) {
                    alert('用户名或密码错误');
                    return;
                }

                currentUser = username;
                currentRole = 'tester';
                currentToken = '';
                localStorage.setItem('frc_user', username);
                localStorage.setItem('frc_role', 'tester');
                localStorage.removeItem('frc_token');
            } else {
                // all non-tester accounts are database-backed
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                if (!response.ok || !result?.ok) {
                    alert(result?.error || '用户名或密码错误');
                    return;
                }

                currentUser = result.username;
                currentRole = result.role || 'admin';
                currentToken = result.token || '';
                localStorage.setItem('frc_user', currentUser);
                localStorage.setItem('frc_role', currentRole);
                if (currentToken) {
                    localStorage.setItem('frc_token', currentToken);
                } else {
                    localStorage.removeItem('frc_token');
                }
            }

            // Redirect to prescouting if returnTo is login or tools
            if (returnTo === '#login' || returnTo === '#tools') {
                window.location.hash = '#tools/prescouting';
            } else {
                window.location.hash = returnTo;
            }
            // Manually trigger render to ensure page updates
            await renderApp();
        }

        async function loginAsTester(returnTo = '#home') {
            currentUser = TESTER_USER;
            currentRole = 'tester';
            currentToken = '';
            localStorage.setItem('frc_user', TESTER_USER);
            localStorage.setItem('frc_role', 'tester');
            localStorage.removeItem('frc_token');

            if (returnTo === '#login' || returnTo === '#tools') {
                window.location.hash = '#tools/prescouting';
            } else {
                window.location.hash = returnTo;
            }
            await renderApp();
        }

        function logout() {
            currentUser = null;
            currentRole = null;
            currentToken = null;
            localStorage.removeItem('frc_user');
            localStorage.removeItem('frc_role');
            localStorage.removeItem('frc_token');
            navigate('#home');
        }

        async function renderHome() {
            const app = document.getElementById('app');
            const loggedIn = currentUser ? true : false;
            
            const header = await loadHeader();
            const footer = await loadFooter();
            
            // Get homepage content from storage
            const content = getHomePageContent();
            
            // Build features section HTML
            const featuresHtml = content.features.map(feature => `
                <div class="home-feature-card">
                    <h3 class="home-feature-title">${feature.icon} ${feature.title}</h3>
                    <p class="home-feature-desc">
                        ${feature.description}
                    </p>
                </div>
            `).join('');
            
            app.innerHTML = `
                ${header}
                <div class="content home-content">
                    <div class="home-about-wrap">
                        <p class="home-about-text home-about-text-gap">
                            ${content.aboutUs.p1}
                        </p>
                        <p class="home-about-text home-about-text-gap">
                            ${content.aboutUs.p2}
                        </p>
                        <p class="home-about-text">
                            ${content.aboutUs.p3}
                        </p>
                    </div>

                    <div class="home-features-grid">
                        ${featuresHtml}
                    </div>
                </div>
                ${footer}
            `;

            const featureCards = app.querySelectorAll('.home-feature-card');
            featureCards.forEach((card, index) => {
                const color = content.features[index]?.color || '#667eea';
                card.style.setProperty('--feature-color', color);
            });
        }

        async function renderToolsLayout(hash) {
            const toolPath = hash.replace('#tools', '') || '/prescouting';
            const app = document.getElementById('app');
            
            const header = await loadHeader();
            const footer = await loadFooter();
            
            app.innerHTML = `
                ${header}
                <div class="container">
                    <div class="sidebar" id="toolsSidebar">
                        <h3>工具</h3>
                        <ul>
                            <li><a href="#tools/prescouting" class="${toolPath === '/prescouting' ? 'active' : ''}">PreScouting</a></li>
                            <li><a href="#tools/scouting" class="${toolPath === '/scouting' ? 'active' : ''}">Scouting</a></li>
                            <li><a href="#tools/analysis" class="${toolPath === '/analysis' ? 'active' : ''}">Analysis</a></li>
                            <li><a href="#home">返回主页</a></li>
                            <li><a href="#" onclick="logout()">登出</a></li>
                        </ul>
                    </div>
                    <div class="content" id="toolsContent">
                        ${renderToolsContent(toolPath)}
                    </div>
                </div>
                ${footer}
            `;

            if (toolPath === '/prescouting') {
                setTimeout(async () => {
                    renderEntries();
                    // Load teams for Shanghai Regional
                    await updateTeamsList('Shanghai Regional');
                    // Initialize prescouting form listeners
                    initializePrescouttingForm();
                    // Load user's assigned teams
                    await loadUserAssignedTeams();
                }, 100);
            }
        }

        function renderToolsContent(path) {
            if (path === '/scouting') {
                return renderScouting();
            } else if (path === '/prescouting') {
                return renderPreScouting();
            } else if (path === '/analysis') {
                return renderAnalysis();
            }
            // Default to prescouting if no specific path
            return renderPreScouting();
        }

        function renderScouting() {
            return `
                <h1>Scouting</h1>
                <div class="scouting-toolbar">
                    <button onclick="showScoutingConfig()">配置字段</button>
                    <button onclick="showScoutingForm()">开始收集数据</button>
                    <button onclick="showScoutingData()">查看数据</button>
                </div>
                <div id="scouting-content">
                    <p>点击上方按钮开始配置或收集数据。</p>
                </div>
            `;
        }

        function showScoutingConfig() {
            const config = getScoutingConfig();
            const templates = getScoutingTemplates();
            const content = document.getElementById('scouting-content');
            
            content.innerHTML = `
                <h2>配置字段</h2>
                <div class="scouting-toolbar scouting-toolbar-config">
                    <div class="scouting-template-col">
                        <label class="scouting-template-label">快速加载模板</label>
                        <select id="template-selector" onchange="if(this.value) loadTemplate(this.value)" class="scouting-template-select">
                            <option value="">选择模板...</option>
                            <option value="默认比赛模板">默认比赛模板</option>
                            ${templates.map(t => `<option value="${t.name}">${t.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="scouting-template-actions">
                        <button onclick="showTemplateManager()">管理模板</button>
                        <button onclick="saveAsTemplate()">保存为模板</button>
                    </div>
                </div>
                <div id="field-list">
                    ${config.fields.map((field, index) => `
                        <div class="entry-card entry-card-static">
                            <h3>${field.label}</h3>
                            <p>类型: ${getFieldTypeText(field.type)}</p>
                            ${field.options ? `<p>选项: ${field.options.join(', ')}</p>` : ''}
                            ${field.required ? '<p class="scouting-required">✓ 必填</p>' : ''}
                            <button onclick="editScoutingField(${index})">编辑</button>
                            <button onclick="deleteScoutingField(${index})">删除</button>
                        </div>
                    `).join('')}
                </div>
                <button onclick="addScoutingField()">添加新字段</button>
            `;
        }

        function getFieldTypeText(type) {
            const types = {
                'text': '文本',
                'number': '数字',
                'radio': '单选',
                'checkbox': '多选'
            };
            return types[type] || type;
        }

        function getScoutingConfig() {
            const savedConfig = localStorage.getItem('scouting_config');
            if (savedConfig) {
                return JSON.parse(savedConfig);
            }
            // Load default template on first use
            const defaultTemplate = getDefaultTemplate();
            saveScoutingConfig({ fields: defaultTemplate.fields });
            return { fields: defaultTemplate.fields };
        }

        function getDefaultTemplate() {
            return {
                name: '默认比赛模板',
                fields: [
                    { id: 'event', label: 'Event', type: 'text', required: true },
                    { id: 'team', label: '赛队队号', type: 'text', required: true },
                    { id: 'stage', label: '阶段', type: 'radio', required: true, options: ['排位', '淘汰'] },
                    
                    // Auto Phase
                    { id: 'auto_tasks', label: '自动阶段任务', type: 'checkbox', required: false, options: ['shooting', 'feeding', '干扰', '离开起始线', '挂车'] },
                    { id: 'auto_efficiency', label: '自动阶段效率', type: 'radio', required: false, options: ['低', '中', '高'] },
                    
                    // Teleop Transition
                    { id: 'teleop_switch_tasks', label: '过度切换任务', type: 'checkbox', required: false, options: ['shooting', 'feeding', '干扰', '瞎逛', '挂车'] },
                    { id: 'teleop_switch_efficiency', label: '过度切换效率', type: 'radio', required: false, options: ['低', '中', '高'] },
                    
                    // Shift 1
                    { id: 'shift1_furnace', label: 'Shift 1 熔炉状态', type: 'radio', required: false, options: ['开', '关'] },
                    { id: 'shift1_tasks', label: 'Shift 1任务', type: 'checkbox', required: false, options: ['shooting', 'feeding', '干扰', '瞎逛', '挂车'] },
                    { id: 'shift1_efficiency', label: 'Shift 1效率', type: 'radio', required: false, options: ['低', '中', '高'] },
                    
                    // Shift 2
                    { id: 'shift2_furnace', label: 'Shift 2 熔炉状态', type: 'radio', required: false, options: ['开', '关'] },
                    { id: 'shift2_tasks', label: 'Shift 2任务', type: 'checkbox', required: false, options: ['shooting', 'feeding', '干扰', '瞎逛', '挂车'] },
                    { id: 'shift2_efficiency', label: 'Shift 2效率', type: 'radio', required: false, options: ['低', '中', '高'] },
                    
                    // Shift 3
                    { id: 'shift3_furnace', label: 'Shift 3 熔炉状态', type: 'radio', required: false, options: ['开', '关'] },
                    { id: 'shift3_tasks', label: 'Shift 3任务', type: 'checkbox', required: false, options: ['shooting', 'feeding', '干扰', '瞎逛', '挂车'] },

            if (templateName === '默认比赛模板') {
                const defaultTemplate = getDefaultTemplate();
                saveScoutingConfig({ fields: defaultTemplate.fields });
                showScoutingConfig();
                return;
            }
            
            const templates = getScoutingTemplates();
            const template = templates.find(t => t.name === templateName);
            if (template) {
                saveScoutingConfig({ fields: template.fields });
                showScoutingConfig();
            }

        async function submitScoutingData() {
            const config = getScoutingConfig();
            const data = { ts: Date.now() };
            
            for (const field of config.fields) {
                if (field.type === 'checkbox') {
                    const checkboxes = document.querySelectorAll(`input[name="field-${field.id}"]:checked`);
                    data[field.id] = Array.from(checkboxes).map(cb => cb.value);
                } else if (field.type === 'radio') {
                    const radio = document.querySelector(`input[name="field-${field.id}"]:checked`);
                    data[field.id] = radio ? radio.value : '';
                } else {
                    const input = document.getElementById(`field-${field.id}`);
                    data[field.id] = input ? input.value : '';
                }
                
                if (field.required && (!data[field.id] || (Array.isArray(data[field.id]) && data[field.id].length === 0))) {
                    alert(`请填写必填字段: ${field.label}`);
                    return;
                }
            }

            if (isAdmin()) {
                const response = await apiFetch('/api/scouting', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    alert('提交失败');
                    return;
                }
            } else {
                const scoutingData = getLocalScoutingData();
                data.id = crypto.randomUUID();
                scoutingData.push(data);
                saveLocalScoutingData(scoutingData);
            }

            alert(isAdmin() ? '数据提交成功！' : '数据提交成功（本地保存）！');
            showScoutingForm();
        }

            if (!confirm('确定要删除这条记录吗？')) return;

        async function exportScoutingData() {
            const config = getScoutingConfig();
            const scoutingData = await getScoutingEntries('');
            
            if (scoutingData.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            // Create CSV
            let csv = config.fields.map(f => f.label).join(',') + ',提交时间\\n';
            
            scoutingData.forEach(entry => {
                const row = config.fields.map(field => {
                    const value = entry[field.id];
                    if (Array.isArray(value)) {
                        return `"${value.join('; ')}"`;
                    }
                    return `"${value || ''}"`;
                }).join(',');
                csv += row + ',' + new Date(entry.ts).toLocaleString() + '\\n';
            });

            // Download
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `scouting_data_${Date.now()}.csv`;
            link.click();
        }

        async function showTeamComparison() {
            const content = document.getElementById('analysis-content');
            content.innerHTML = '<p>加载中...</p>';
            
            // Get all data
            const preScoutData = await getPrescoutEntries('');
            const scoutingData = await getScoutingEntries('');
            
            // Build team list with PreScouting details
            const teamsMap = new Map();
            
            preScoutData.forEach(entry => {
                if (!teamsMap.has(entry.teamNumber)) {
                    teamsMap.set(entry.teamNumber, {
                        number: entry.teamNumber,
                        name: entry.teamName,
                        preScoutCount: 0,
                        scoutingCount: 0,
                        practices: [],
                        compCounts: [],
                        chassis: {}
                    });
                }
                const team = teamsMap.get(entry.teamNumber);
                team.preScoutCount++;
                if (entry.practice) team.practices.push(parseInt(entry.practice) || 0);
                if (entry.compCount) team.compCounts.push(entry.compCount);
                if (entry.chassis) {
                    team.chassis[entry.chassis] = (team.chassis[entry.chassis] || 0) + 1;
                }
            });
            
            scoutingData.forEach(entry => {
                const teamNum = entry.team || '';
                if (teamNum) {
                    if (!teamsMap.has(teamNum)) {
                        teamsMap.set(teamNum, {
                            number: teamNum,
                            name: '-',
                            preScoutCount: 0,
                            scoutingCount: 0,
                            practices: [],
                            compCounts: [],
                            chassis: {}
                        });
                    }
                    teamsMap.get(teamNum).scoutingCount++;
                }
            });
            
            const teams = Array.from(teamsMap.values()).sort((a, b) => {
                const numA = parseInt(a.number) || 0;
                const numB = parseInt(b.number) || 0;
                return numA - numB;
            });
            
            let html = `
                <h2>赛队对比</h2>
                <p>共 ${teams.length} 支赛队</p>
                
                <div class="analysis-table-wrap analysis-table-wrap-gap">
                    <table class="analysis-table">
                        <thead>
                            <tr class="analysis-table-head-gradient">
                                <th>队号</th>
                                <th>队名</th>
                                <th class="analysis-cell-center">PreScouting</th>
                                <th class="analysis-cell-center">平均练习时长</th>
                                <th class="analysis-cell-center">平均比赛次数</th>
                                <th class="analysis-cell-center">常用底盘</th>
                                <th class="analysis-cell-center">Scouting</th>
                                <th class="analysis-cell-center">总计</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${teams.map(team => {
                                const total = team.preScoutCount + team.scoutingCount;
                                const avgPractice = team.practices.length > 0 
                                    ? (team.practices.reduce((a, b) => a + b, 0) / team.practices.length).toFixed(1) 
                                    : '-';
                                const avgComp = team.compCounts.length > 0 
                                    ? (team.compCounts.reduce((a, b) => a + b, 0) / team.compCounts.length).toFixed(1) 
                                    : '-';
                                const commonChassis = Object.keys(team.chassis).length > 0 
                                    ? Object.keys(team.chassis).sort((a, b) => team.chassis[b] - team.chassis[a])[0]
                                    : '-';
                                
                                return `
                                    <tr class="analysis-row">
                                        <td class="analysis-cell analysis-cell-strong">${team.number}</td>
                                        <td class="analysis-cell">${team.name}</td>
                                        <td class="analysis-cell analysis-cell-center">${team.preScoutCount}</td>
                                        <td class="analysis-cell analysis-cell-center">${avgPractice}h</td>
                                        <td class="analysis-cell analysis-cell-center">${avgComp}</td>
                                        <td class="analysis-cell analysis-cell-center">${commonChassis}</td>
                                        <td class="analysis-cell analysis-cell-center">${team.scoutingCount}</td>
                                        <td class="analysis-cell analysis-cell-center analysis-cell-strong">${total}</td>
                                        <td class="analysis-cell">
                                            <button onclick="showTeamDetail('${team.number}')" class="analysis-btn-sm">查看详情</button>
                                        </td>

        async function loadTeamsForEvent(eventName) {
            try {
                const response = await fetch(`/api/teams?event=${encodeURIComponent(eventName)}&year=2026`);
                if (!response.ok) {
                    console.error('Failed to load teams:', response.status);
                    return [];
                }
                const teams = await response.json();
                return teams;
            } catch (err) {
                console.error('Error loading teams:', err);
                return [];
            }
        }

        async function handleEventChange() {
            const select = document.getElementById('prescout-event');
            if (!select || !select.value) return;
            await updateTeamsList(select.value);
        }

        async function updateTeamsList(eventName) {
            if (!eventName) {
                currentEventTeams = [];
                attachTeamInputListeners();
                return;
            }

            const teams = await loadTeamsForEvent(eventName);
            currentEventTeams = teams;
            attachTeamInputListeners();
        }

        function selectTeam(teamNumber, teamName) {
            const numberInput = document.getElementById('prescout-team-number');
            const nameInput = document.getElementById('prescout-team-name');
            if (numberInput) numberInput.value = teamNumber;
            if (nameInput) nameInput.value = teamName;
        }

        function attachTeamInputListeners() {
            const numberInput = document.getElementById('prescout-team-number');
            const nameInput = document.getElementById('prescout-team-name');
            
            if (numberInput) {
                numberInput.oninput = handleTeamNumberInput;

            if (nameInput) {

            const carTypeSelect = document.getElementById('prescout-car-type');

                carTypeSelect.onchange = function() {
                    if (this.value === 'other') {
                        carTypeOther.style.display = 'block';
                    } else {
                        carTypeOther.style.display = 'none';
                        carTypeOther.value = '';

            }

            try {
                if (!isAdmin()) {
                    userAssignedTeams = [];
                    return;
                }
                const response = await apiFetch('/api/team-assignments');
                const assignments = await response.json();
                // Filter assignments for current user
                userAssignedTeams = assignments
                    .filter(a => a.username === currentUser)
                    .map(a => a.team_number);
            } catch (err) {
                console.error('Error loading user assigned teams:', err);
                userAssignedTeams = [];

        function handleTeamNumberInput() {
            if (!currentEventTeams || currentEventTeams.length === 0) return;
            
            const input = document.getElementById('prescout-team-number');
            const nameInput = document.getElementById('prescout-team-name');
            const hintDiv = document.getElementById('team-assignment-hint');
            if (!input || !nameInput) return;
            
            const teamNumber = input.value.trim();
            if (!teamNumber) {
                nameInput.value = '';
                if (hintDiv) hintDiv.innerText = '';
                return;
            }
            
            const team = currentEventTeams.find(t => t.team_number === teamNumber);
            if (team) {
                nameInput.value = team.team_name;
            } else {
                nameInput.value = '';
            }
            
            // Check if team is assigned to current user
            if (hintDiv) {
                if (userAssignedTeams.includes(teamNumber)) {
                    hintDiv.innerHTML = '<span style="color: #28a745;">✓ 已分配给你</span>';
                } else {
                    hintDiv.innerHTML = '<span style="color: #999;">自由填写</span>';
                }
            }
        }

            const input = document.getElementById('prescout-team-name');
            const numberInput = document.getElementById('prescout-team-number');
            if (!input || !numberInput) return;
            
            const teamName = input.value.trim();
            if (!teamName) {
                numberInput.value = '';
                return;

            const team = currentEventTeams.find(t => t.team_name.toLowerCase().includes(teamName.toLowerCase()));
            if (team) {
                numberInput.value = team.team_number;
            } else {
                numberInput.value = '';

                                    ${entry.climbPath ? `<div class="detail-item"><strong>Climb Path:</strong> ${entry.climbPath}</div>` : ''}
                                    ${entry.shooterChannels ? `<div class="detail-item"><strong>Shooter Channels:</strong> ${entry.shooterChannels}</div>` : ''}
                                    ${entry.climbLevel ? `<div class="detail-item"><strong>Climb Level:</strong> ${entry.climbLevel}</div>` : ''}
                                    ${entry.storageCapacity ? `<div class="detail-item"><strong>Storage Capacity:</strong> ${entry.storageCapacity}</div>` : ''}
                                    ${entry.storageShootTime ? `<div class="detail-item"><strong>Storage Shoot Time:</strong> ${entry.storageShootTime}s</div>` : ''}
                                    ${entry.autoCount ? `<div class="detail-item"><strong>Auto Count:</strong> ${entry.autoCount}</div>` : ''}
                                    ${entry.autoPath ? `<div class="detail-item"><strong>Auto Path:</strong> ${entry.autoPath}</div>` : ''}
                                    ${entry.autoAccuracy ? `<div class="detail-item"><strong>Auto Accuracy:</strong> ${entry.autoAccuracy}%</div>` : ''}
                                    ${entry.autoClimb ? `<div class="detail-item"><strong>Auto Climb:</strong> ${entry.autoClimb}</div>` : ''}
                                    ${entry.autoClimbAccuracy ? `<div class="detail-item"><strong>Auto Climb Accuracy:</strong> ${entry.autoClimbAccuracy}%</div>` : ''}
                                    ${entry.autoStartPos ? `<div class="detail-item"><strong>Auto Start Position:</strong> ${entry.autoStartPos}</div>` : ''}
                                    ${entry.manualAccuracy ? `<div class="detail-item"><strong>Manual Accuracy:</strong> ${entry.manualAccuracy}%</div>` : ''}
                                    ${entry.contact ? `<div class="detail-item"><strong>Contact:</strong> ${entry.contact}</div>` : ''}
                                </div>
                                <button onclick="submitLocalPrescout('${entry.id}')" class="btn-mt-10">提交到服务器</button>
                            </div>
                        `).join('')}
                    `;
                }
            }

            container.innerHTML = html;
        }

        function updateFilterDropdowns(entries) {
            const eventFilter = document.getElementById('filter-event');
            const collectorFilter = document.getElementById('filter-collector');

            if (!eventFilter || !collectorFilter) return;

            // Get unique events and collectors
            const events = [...new Set(entries.map(e => e.event))];
            const collectors = [...new Set(entries.map(e => e.collector))];

            // Update event dropdown
            const currentEvent = eventFilter.value;
            eventFilter.innerHTML = '<option value="">所有赛事</option>' + 
                events.map(e => `<option value="${e}" ${e === currentEvent ? 'selected' : ''}>${e}</option>`).join('');

            // Update collector dropdown
            const currentCollector = collectorFilter.value;
            collectorFilter.innerHTML = '<option value="">所有收集者</option>' + 
                collectors.map(c => `<option value="${c}" ${c === currentCollector ? 'selected' : ''}>${c}</option>`).join('');
        }

        async function showEntryDetail(id) {
            const entries = await getPrescoutEntries('');
            const entry = entries.find(e => e.id === id);

            if (!entry) {
                alert('未找到该记录');
                return;
            }

            alert(`
Team ${entry.teamNumber} - ${entry.teamName}
Event: ${entry.event}
Collector: ${entry.collector}
Practice Duration: ${entry.practice}h
Competition Count: ${entry.compCount}
Chassis Type: ${entry.chassis}
Submitted: ${new Date(entry.ts).toLocaleString()}
            `);
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('toolsSidebar');
            if (sidebar) {
                sidebar.classList.toggle('active');
            }
        }

        // Initialize
        window.addEventListener('hashchange', renderApp);
        window.addEventListener('load', () => {
            renderApp();
            // Auto-load entries if on prescouting page
            const hash = window.location.hash;
            if (hash === '#tools/prescouting' || hash === '#tools') {
                setTimeout(renderEntries, 500);
            }
        });

        // Auto refresh entries when navigating to prescouting
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            if (hash === '#tools/prescouting' || hash === '#tools') {
                setTimeout(renderEntries, 500);
            }
        });
    </script>
</body>
</html>
